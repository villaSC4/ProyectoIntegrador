<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MediSign-ID Test</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center p-10">

    <h1 class="text-2xl font-bold mb-4 text-blue-400">Prueba de Reconocimiento Facial</h1>

    <div class="relative border-4 border-gray-700 rounded-lg overflow-hidden">
        <video id="webcam" width="640" height="480" autoplay muted class="bg-black"></video>
        <div id="loader" class="absolute inset-0 flex items-center justify-center bg-black/50 text-xl">
            Cargando IA...
        </div>
    </div>

    <div class="mt-6 space-x-4">
        <button id="btnRegistrar" disabled class="bg-gray-600 px-6 py-2 rounded font-bold transition-colors">
            Guardar Mi Rostro
        </button>
        <button id="btnVerificar" disabled class="bg-gray-600 px-6 py-2 rounded font-bold transition-colors">
            Probar Login
        </button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const loader = document.getElementById('loader');
        const btnReg = document.getElementById('btnRegistrar');
        const btnVer = document.getElementById('btnVerificar');

        async function iniciarCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
            } catch (err) {
                alert("Error de cámara: " + err);
            }
        }

        // 2. Cargar Modelos (Usando una URL más estable)
        async function cargarModelos() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            try {
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                loader.classList.add('hidden');
                btnReg.disabled = false;
                btnVer.disabled = false;
                btnReg.classList.replace('bg-gray-600', 'bg-green-600');
                btnVer.classList.replace('bg-gray-600', 'bg-blue-600');
                console.log("IA Lista");
            } catch (e) {
                loader.innerText = "Error cargando modelos de IA";
            }
        }

        async function obtenerDescriptor() {
            const opciones = new faceapi.TinyFaceDetectorOptions({
                inputSize: 512, 
                scoreThreshold: 0.5 
            });

            if (video.paused || video.ended) return null;

            const deteccion = await faceapi.detectSingleFace(video)
                .withFaceLandmarks()
                .withFaceDescriptor();

            if (!deteccion) {
                console.log("Fallo en detección, reintentando con brillo...");
                alert("Rostro no detectado. Asegúrate de tener buena luz.");
                return null;
            }
            return Array.from(deteccion.descriptor);
        }

        btnReg.onclick = async () => {
            const descriptor = await obtenerDescriptor();
            if (!descriptor) return;

            try {
                const res = await fetch('http://127.0.0.1:8000/api/rostro/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ vector: descriptor }) // Laravel espera "vector"
                });

                const data = await res.json();
                alert(data.mensaje || "Error en el servidor");
                console.log("Registro:", data);
            } catch (error) {
                console.error("Error:", error);
                alert("No se pudo conectar con Laravel");
            }
        };

        btnVer.onclick = async () => {
            const descriptor = await obtenerDescriptor();
            if (!descriptor) return;

            try {
                const res = await fetch('http://127.0.0.1:8000/api/rostro/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ vector_actual: descriptor }) // Laravel espera "vector_actual"
                });

                const data = await res.json();
                
                if (res.ok) {
                    alert("✅ " + data.mensaje + " " + data.usuario);
                } else {
                    alert("❌ " + data.mensaje + " (Distancia: " + data.distancia_minima.toFixed(4) + ")");
                }
                console.log("Login:", data);
            } catch (error) {
                console.error("Error:", error);
                alert("Error de conexión con la API");
            }
        };
        
        iniciarCamara().then(cargarModelos);
    </script>
</body>
</html>
