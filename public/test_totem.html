<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba MediSign-ID</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen">

    <h1 class="text-3xl font-bold mb-6 text-blue-400">MediSign-ID: Test de Conexión</h1>
    
    <div class="relative border-8 border-gray-700 rounded-lg overflow-hidden">
        <video id="webcam" class="w-[640px] h-[480px] bg-black" autoplay></video>
        <div id="status-box" class="absolute bottom-0 w-full p-4 bg-black/70 text-center font-bold text-xl">
            Iniciando cámara...
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const statusBox = document.getElementById('status-box');
        let estaProcesando = false; 

        async function avisarALaravel() {
            if (estaProcesando) return;
            estaProcesando = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/api/validar-gesto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ dedos_unidos: true })
                });

                const data = await response.json();

                alert("Raquel " + data.mensaje);
                
                setTimeout(() => {
                    estaProcesando = false;
                }, 5000);

            } catch (error) {
                alert("Error de conexión: " + error);
                estaProcesando = false;
            }
        }

        function onResults(results) {
            if (estaProcesando) return; 

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const mano = results.multiHandLandmarks[0];
                const pulgar = mano[4];
                const indice = mano[8];

                const distancia = Math.sqrt(
                    Math.pow(pulgar.x - indice.x, 2) + 
                    Math.pow(pulgar.y - indice.y, 2)
                );

                if (distancia < 0.05) {
                    camera.stop(); 
                    console.log("📸 Cámara detenida para ver resultados.");
                    avisarALaravel();
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7, 
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
